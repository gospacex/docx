# Couchbase 单节点配置
endpoints:
  - ${env:CB_ENDPOINT:-localhost:8091}
bucket: ${env:CB_BUCKET:-default}
username: ${env:CB_USERNAME:-Administrator}
password: ${env:CB_PASSWORD:-password}
connect_timeout_ms: 10000
socket_timeout_ms: 5000
tracing:
  enabled: true
  service_name: couchbase-example
  exporter: ${env:CB_TRACE_EXPORTER:-jaeger}
  endpoint: ${env:JAEGER_ENDPOINT:-localhost:4317}
  protocol: grpc
  sampler_type: always_on
  sampler_ratio: 1.0